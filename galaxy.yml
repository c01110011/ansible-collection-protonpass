---
# This collection is initialized by https://github.com/ansible/ansible-creator 26.3.2

# See https://docs.ansible.com/ansible/latest/dev_guide/collections_galaxy_meta.html

namespace: "c01110011"
name: "protonpass"
version: 1.0.0
readme: README.md
authors:
  - Catalin Stan <c01110011@users.noreply.github.com>

description: >-
  Ansible collection for Proton Pass integration. Retrieve secrets from Proton Pass
  vaults using the official pass-cli. Features in-memory caching, URI syntax support,
  and actionable error messages.
license:
  - GPL-3.0-or-later

# TO-DO: update the tags based on your content type
tags:
  - protonpass
  - proton
  - secrets
  - password_manager
  - security
  - credentials
  - vault
# TO-DO: maintain this list to reflect the collection's dependencies
dependencies:
  "ansible.utils": "*" # note: "*" selects the latest version available

repository: https://github.com/c01110011/ansible-collection-protonpass
documentation: https://github.com/c01110011/ansible-collection-protonpass/blob/main/c01110011/protonpass/README.md
homepage: https://github.com/c01110011/ansible-collection-protonpass
issues: https://github.com/c01110011/ansible-collection-protonpass/issues

# A list of file glob-like patterns used to filter any files or directories that should not be included in the build
# artifact. A pattern is matched from the relative path of the file or directory of the collection directory. This
# uses 'fnmatch' to match the files or directories. Some directories and files like 'galaxy.yml', '*.pyc', '*.retry',
# and '.git' are always filtered. Mutually exclusive with 'manifest'
build_ignore:
  - .git
  - .github
  - .gitignore
  - .ansible-lint
  - .pytest_cache
  - .mypy_cache
  - __pycache__
  - "*.pyc"
  - "*.pyo"
  - tests
  - molecule
  - .venv
  - venv
  - requirements-dev.txt
  - CONTRIBUTING.md
  - CHANGELOG.md
  - Makefile
  - verify.sh
  - pytest.ini
  - .yamllint
  - CLAUDE.md
# A dict controlling use of manifest directives used in building the collection artifact. The key 'directives' is a
# list of MANIFEST.in style
# L(directives,https://packaging.python.org/en/latest/guides/using-manifest-in/#manifest-in-commands). The key
# 'omit_default_directives' is a boolean that controls whether the default directives are used. Mutually exclusive
# with 'build_ignore'
# manifest: null
